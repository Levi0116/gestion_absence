{% extends "base.html" %}

{% block title %}Programmer une Séance{% endblock %}

{% block breadcrumb %}
<a href="{{ url_for('index') }}">Accueil</a>
<a href="{{ url_for('enseignements_index') }}">Séances</a>
<span>Ajouter</span>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        <i class="fas fa-calendar-plus" style="margin-right: 12px;"></i>
        Programmer une séance
    </h1>
</div>

<div class="form-container">
    <form method="POST" id="enseignementForm">
        <div class="form-group">
            <label for="date_enseignement">
                <i class="fas fa-calendar"></i> Date *
            </label>
            <input type="date" 
                   id="date_enseignement" 
                   name="date_enseignement" 
                   class="form-control" 
                   required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="horaire_debut">
                    <i class="fas fa-clock"></i> Heure début *
                </label>
                <input type="time" 
                       id="horaire_debut" 
                       name="horaire_debut" 
                       class="form-control" 
                       required>
            </div>

            <div class="form-group">
                <label for="horaire_fin">
                    <i class="fas fa-clock"></i> Heure fin *
                </label>
                <input type="time" 
                       id="horaire_fin" 
                       name="horaire_fin" 
                       class="form-control" 
                       required>
            </div>
        </div>

        <div class="form-group">
            <label for="code_filiere">
                <i class="fas fa-building"></i> Filière *
            </label>
            <select id="code_filiere" name="code_filiere" class="form-control" required>
                <option value="">Sélectionner une filière...</option>
                {% for filiere in filieres %}
                <option value="{{ filiere.code_filiere }}">{{ filiere.Libele_filiere }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="code_matiere">
                <i class="fas fa-book"></i> Matière *
            </label>
            <select id="code_matiere" name="code_matiere" class="form-control" required>
                <option value="">Sélectionner d'abord une filière...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="id_enseignant">
                <i class="fas fa-chalkboard-teacher"></i> Enseignant *
            </label>
            <select id="id_enseignant" name="id_enseignant" class="form-control" required>
                <option value="">Sélectionner un enseignant...</option>
                {% for enseignant in enseignants %}
                <option value="{{ enseignant.id_enseignant }}">
                    {{ enseignant.Prenom }} {{ enseignant.Nom }} ({{ enseignant.Specialite or 'Non spécifié' }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="id_periode">
                <i class="fas fa-calendar-alt"></i> Période *
            </label>
            <select id="id_periode" name="id_periode" class="form-control" required>
                <option value="">Sélectionner une période...</option>
                {% for periode in periodes %}
                <option value="{{ periode.id_periode }}">{{ periode.Libelle_periode }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Programmer
            </button>
            <a href="{{ url_for('enseignements_index') }}" class="btn btn-outline">
                <i class="fas fa-times"></i> Annuler
            </a>
        </div>
    </form>
</div>

<style>
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    
    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }
    }
</style>

<script>
// Chargement dynamique des matières selon la filière
document.getElementById('code_filiere').addEventListener('change', function() {
    const filiereId = this.value;
    const matiereSelect = document.getElementById('code_matiere');
    
    matiereSelect.innerHTML = '<option value="">Chargement...</option>';
    
    if (filiereId) {
        fetch(`/api/matieres-par-filiere/${filiereId}`)
            .then(response => response.json())
            .then(data => {
                matiereSelect.innerHTML = '<option value="">Sélectionner une matière...</option>';
                data.forEach(matiere => {
                    const option = document.createElement('option');
                    option.value = matiere.code_matiere;
                    option.textContent = matiere.Nom_matiere;
                    matiereSelect.appendChild(option);
                });
            })
            .catch(error => {
                console.error('Erreur:', error);
                matiereSelect.innerHTML = '<option value="">Erreur de chargement</option>';
            });
    } else {
        matiereSelect.innerHTML = '<option value="">Sélectionner d\'abord une filière...</option>';
    }
});
</script>
{% endblock %}
